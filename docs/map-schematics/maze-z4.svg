  <text x="1062" y="47" font-size="10" fill="#f5efe0" font-family="monospace">Orchard is now a traversal/puzzle graph with Gravity Well gate, raised ridge, lower creek secret, Scout shelter loop, pump-station return and storm-ridge exit.</text>
  <text x="1062" y="75" font-size="11" fill="#f5efe0" font-family="monospace">Legend: white spawn · green objective/sign · cyan exit · yellow cache · red enemy/scanner · purple weapon · red dashed boost gap · teal gravity</text>
  <text x="1062" y="106" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">Orchard Entry (10,51)</text>
<text x="1062" y="122" font-size="10" fill="#f5efe0" font-family="monospace">Spawn from Town on the tractor lane.</text>
<text x="1062" y="149" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">West Rows (12,29)</text>
<text x="1062" y="165" font-size="10" fill="#f5efe0" font-family="monospace">Recall Disc-focused lane with a Scout-cache reward.</text>
<text x="1062" y="192" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">Lower Rows (29,50)</text>
<text x="1062" y="208" font-size="10" fill="#f5efe0" font-family="monospace">Weapon pickup / combat route.</text>
<text x="1062" y="235" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">Gravity Well (35,35)</text>
<text x="1062" y="251" font-size="10" fill="#f5efe0" font-family="monospace">Traversal launcher to raised ridge.</text>
<text x="1062" y="278" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">Lower Creek (27,16)</text>
<text x="1062" y="294" font-size="10" fill="#f5efe0" font-family="monospace">Optional puzzle/secret pocket.</text>
<text x="1062" y="321" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">Crop Circle (50,27)</text>
<text x="1062" y="337" font-size="10" fill="#f5efe0" font-family="monospace">Maze Heart objective hub.</text>
<text x="1062" y="364" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">Raised Ridge Cache (50,10)</text>
<text x="1062" y="380" font-size="10" fill="#f5efe0" font-family="monospace">Gravity Well destination and Arc pickup.</text>
<text x="1062" y="407" font-size="12" fill="#e8f5de" font-family="monospace" font-weight="700">East Rows (70,28)</text>
